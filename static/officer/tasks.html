<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Tasks - Officer Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#F3F4F6',
                        dark: '#1F2937',
                        accent: '#F59E0B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside
            class="bg-white border-r border-gray-200 min-h-screen flex flex-col fixed left-0 top-0 h-full z-10 transition-all duration-300 w-64 shadow-sm">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-blue-600">CCRSMS</h1>
                    <p class="text-xs text-gray-500 uppercase tracking-wider mt-1">Officer Portal</p>
                </div>
            </div>

            <nav class="flex-grow p-3 space-y-2 overflow-y-auto overflow-x-hidden">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-tachometer-alt text-lg flex-shrink-0"></i>
                    <span>Dashboard</span>
                </a>
                <a href="complaints.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-clipboard-list text-lg flex-shrink-0"></i>
                    <span>Assigned Complaints</span>
                </a>
                <a href="tasks.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap bg-blue-50 text-blue-600">
                    <i class="fas fa-tasks text-lg flex-shrink-0"></i>
                    <span>Field Tasks</span>
                </a>
                <a href="notifications.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-bell text-lg flex-shrink-0"></i>
                    <span>Notifications</span>
                </a>
                <a href="profile.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-user text-lg flex-shrink-0"></i>
                    <span>My Profile</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-100">
                <button
                    class="flex items-center gap-3 px-3 py-3 rounded-lg text-red-600 hover:bg-red-50 w-full font-medium transition-colors whitespace-nowrap">
                    <i class="fas fa-sign-out-alt text-lg flex-shrink-0"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow bg-gray-100 min-h-screen p-8 ml-64 overflow-y-auto h-screen">
            <header class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900">Field Tasks</h1>
                <p class="text-gray-500">Track and manage your daily field assignments.</p>
            </header>

            <div class="grid md:grid-cols-2 gap-6">
                <!-- Task 1 -->
                <div id="task-1" class="bg-white rounded-xl shadow-sm border-l-4 border-blue-600 p-6 relative">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-xl text-gray-900">Inspect Drainage Blockage</h3>
                        <span id="status-1" class="px-2 py-1 rounded text-xs font-bold bg-gray-100 text-gray-600">
                            Pending
                        </span>
                    </div>
                    <div class="space-y-2 mb-6">
                        <p class="text-gray-600 flex items-center gap-2"><i
                                class="fas fa-map-marker-alt text-blue-500"></i> Zone 4, Market area</p>
                        <p class="text-gray-600 flex items-center gap-2"><i class="fas fa-clock text-blue-500"></i>
                            10:00 AM</p>
                    </div>
                    <div class="flex gap-3 buttons-1">
                        <button onclick="handleStartTask(1)"
                            class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors">
                            <i class="fas fa-play"></i> Start
                        </button>
                        <button onclick="handleCompleteTask(1)"
                            class="border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors">
                            <i class="fas fa-check-circle"></i> Complete
                        </button>
                    </div>
                </div>

                <!-- Task 2 -->
                <div id="task-2" class="bg-white rounded-xl shadow-sm border-l-4 border-blue-600 p-6 relative">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-xl text-gray-900">Verify Pothole Repair</h3>
                        <span id="status-2" class="px-2 py-1 rounded text-xs font-bold bg-yellow-100 text-yellow-700">
                            In Progress
                        </span>
                    </div>
                    <div class="space-y-2 mb-6">
                        <p class="text-gray-600 flex items-center gap-2"><i
                                class="fas fa-map-marker-alt text-blue-500"></i> Main Street</p>
                        <p class="text-gray-600 flex items-center gap-2"><i class="fas fa-clock text-blue-500"></i>
                            02:00 PM</p>
                    </div>
                    <div class="flex gap-3 buttons-2">
                        <button onclick="handleCompleteTask(2)"
                            class="border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors">
                            <i class="fas fa-check-circle"></i> Complete
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function handleStartTask(id) {
            Swal.fire({
                title: 'Start Task?',
                text: "Are you ready to begin this assignment?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0958d9',
                confirmButtonText: 'Yes, Start Now'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Update UI
                    document.getElementById(`status-${id}`).className = 'px-2 py-1 rounded text-xs font-bold bg-yellow-100 text-yellow-700';
                    document.getElementById(`status-${id}`).innerText = 'In Progress';

                    // Remove start button effectively
                    const btnContainer = document.querySelector(`.buttons-${id}`);
                    btnContainer.innerHTML = `
                        <button onclick="handleCompleteTask(${id})" class="border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors">
                            <i class="fas fa-check-circle"></i> Complete
                        </button>
                    `;

                    Swal.fire('Started!', 'You have clocked in for this task.', 'success');
                }
            });
        }

        function handleCompleteTask(id) {
            Swal.fire({
                title: 'Complete Task?',
                text: "Have you finished all required work?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                confirmButtonText: 'Yes, Mark Complete'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Update UI
                    const card = document.getElementById(`task-${id}`);
                    card.classList.remove('border-blue-600');
                    card.classList.add('border-green-500', 'opacity-75');

                    document.getElementById(`status-${id}`).className = 'px-2 py-1 rounded text-xs font-bold bg-green-100 text-green-700';
                    document.getElementById(`status-${id}`).innerText = 'Completed';

                    // Remove buttons
                    const btnContainer = document.querySelector(`.buttons-${id}`);
                    btnContainer.innerHTML = `
                        <span class="text-green-600 font-bold flex items-center gap-2"><i class="fas fa-check-circle"></i> Completed</span>
                    `;

                    Swal.fire('Completed!', 'Task marked as done. Good job!', 'success');
                }
            });
        }
    </script>
</body>

</html>
