<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Officer Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#F3F4F6',
                        dark: '#1F2937',
                        accent: '#F59E0B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside
            class="bg-white border-r border-gray-200 min-h-screen flex flex-col fixed left-0 top-0 h-full z-10 transition-all duration-300 w-64 shadow-sm">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-blue-600">CCRSMS</h1>
                    <p class="text-xs text-gray-500 uppercase tracking-wider mt-1">Officer Portal</p>
                </div>
            </div>

            <nav class="flex-grow p-3 space-y-2 overflow-y-auto overflow-x-hidden">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-tachometer-alt text-lg flex-shrink-0"></i>
                    <span>Dashboard</span>
                </a>
                <a href="complaints.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-clipboard-list text-lg flex-shrink-0"></i>
                    <span>Assigned Complaints</span>
                </a>
                <a href="tasks.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-tasks text-lg flex-shrink-0"></i>
                    <span>Field Tasks</span>
                </a>
                <a href="notifications.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap bg-blue-50 text-blue-600">
                    <i class="fas fa-bell text-lg flex-shrink-0"></i>
                    <span>Notifications</span>
                </a>
                <a href="profile.html"
                    class="flex items-center gap-3 px-3 py-3 rounded-lg transition-colors font-medium whitespace-nowrap text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                    <i class="fas fa-user text-lg flex-shrink-0"></i>
                    <span>My Profile</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-100">
                <button
                    class="flex items-center gap-3 px-3 py-3 rounded-lg text-red-600 hover:bg-red-50 w-full font-medium transition-colors whitespace-nowrap">
                    <i class="fas fa-sign-out-alt text-lg flex-shrink-0"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow bg-gray-100 min-h-screen p-8 ml-64 overflow-y-auto h-screen">
            <header class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900">Notifications</h1>
            </header>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden divide-y divide-gray-100">
                <!-- Notification 1 -->
                <div class="p-6 flex items-start gap-4 hover:bg-gray-50 transition-colors">
                    <div class="mt-1 text-xl text-blue-500">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div>
                        <p class="text-gray-900 font-medium">New complaint assigned: "Broken Street Light"</p>
                        <p class="text-gray-500 text-sm mt-1">10 mins ago</p>
                    </div>
                </div>
                <!-- Notification 2 -->
                <div class="p-6 flex items-start gap-4 hover:bg-gray-50 transition-colors">
                    <div class="mt-1 text-xl text-red-500">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <div>
                        <p class="text-gray-900 font-medium">Urgent: Heavy rain forecast, prioritize drainage checks.
                        </p>
                        <p class="text-gray-500 text-sm mt-1">1 hour ago</p>
                    </div>
                </div>
                <!-- Notification 3 -->
                <div class="p-6 flex items-start gap-4 hover:bg-gray-50 transition-colors">
                    <div class="mt-1 text-xl text-yellow-500">
                        <i class="fas fa-comment-alt"></i>
                    </div>
                    <div>
                        <p class="text-gray-900 font-medium">Admin added a note to case #1234</p>
                        <p class="text-gray-500 text-sm mt-1">2 hours ago</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
